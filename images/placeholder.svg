<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1950" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.9" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="900" height="1950" fill="url(#bg)"/>
  <rect width="900" height="1950" fill="url(#dots)"/>
  <g font-family="Inter Tight, system-ui, sans-serif" text-anchor="middle">
    <text x="450" y="940" font-size="80" font-weight="700" letter-spacing="-3" fill="rgba(255,255,255,0.78)">Connect<tspan fill="rgba(255,255,255,1)">.</tspan></text>
    <text x="450" y="1010" font-size="22" font-weight="500" letter-spacing="6" fill="rgba(255,255,255,0.42)" style="text-transform:uppercase;">SCREENSHOT GOES HERE</text>
    <text x="450" y="1060" font-size="18" font-weight="400" fill="rgba(255,255,255,0.32)">drop your image into /images/</text>
  </g>
  <g stroke="rgba(255,255,255,0.10)" fill="none">
    <line x1="80" y1="120" x2="820" y2="120" stroke-width="1"/>
    <line x1="80" y1="1830" x2="820" y2="1830" stroke-width="1"/>
  </g>
  <g font-family="Inter Tight, system-ui, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.42)" letter-spacing="4">
    <text x="80" y="100" style="text-transform:uppercase;">CONNECT.</text>
    <text x="820" y="100" text-anchor="end" style="text-transform:uppercase;">PREVIEW</text>
  </g>
</svg>
